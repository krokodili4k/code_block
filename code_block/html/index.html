<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlockCode</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header class="header">
        <a class="logo">BlockCode</a> 
    </header>

    <div class="content">

        <div class="left-panel">
        
                <div class="panel-header">
                    <h3>BLOCKS</h3>
                    <button class="clear-block-btn">Очистить код</button>
                </div>
    
                <div class="block-container">
                    <div class="block-code" draggable="true" data-type="start">
                        <div class="block-header">
                            <span class="block-title">Начало программы</span>
                        </div>
                    </div>

                    <div class="block-code" draggable="true" data-type="var">
                        <div class="block-header">
                            <span class="block-title">Объявление переменных</span>
                        </div>
                        <div class="block-code-content">
                            <div class="block-varible">
                                <input type="text" class="input-left" id="input_block_varible" placeholder="переменный 1">
                            </div>
                        </div>
                    </div>
    
                    <div class="block-code" draggable="true" data-type="assign">
                        <div class="block-header">
                            <span class="block-title">Блок присваивания целочисленной переменной</span>
                        </div>
                        <div class="block-code-content">
                            <div class="block-varible">
                                <input type="text" class="input-left" id="input1_varible_block" placeholder="Имя переменных">
                                <span>=</span>
                                <input type="text" class="input-right" id="input2_varible_block" placeholder="Значение">
                            </div>
                        </div>
                    </div>

                    <div class="block-code" draggable="true" data-type="assign">
                        <div class="block-header">
                            <span class="block-title">Цикл (while)</span>
                        </div>
                        
                        <div class="block-code-content">
                            <div class="block-cycle-container">
                                <input type="text" class="input-left" id="input_while_block" placeholder="значение 1">
                                <select class="operator-select" id="selector_while_block">
                                    <option value=">">></option>
                                    <option value="<"><</option>
                                    <option value="==">==</option>
                                    <option value="!=">!=</option>
                                    <option value=">=">>=</option>
                                    <option value="<="><=</option>
                                </select>
                                <input type="text" class="input-right" placeholder="значение 2">
                            </div>
                            
                            <div class="cycle-blocks">

                            </div>
                        </div>

                        <div class="block-header">
                            <span class="block-title">Конец цикла</span>
                        </div>
                    </div>
                    
                    <div class="block-code" draggable="true" data-type="assign">
                        <div class="block-header">
                            <span class="block-title">Если</span>
                        </div>
                        <div class="block-content">
                            <div class="condition-row">
                                <input type="text" class="input-left" id="varible1_condition_block" placeholder="значение 1">
                                <select class="operator-select" id="selector_condition_block">
                                    <option value=">">></option>
                                    <option value="<"><</option>
                                    <option value="==">==</option>
                                    <option value="!=">!=</option>
                                    <option value=">=">>=</option>
                                    <option value="<="><=</option>
                                </select>
                                <input type="text" class="input-right" id="varible2_condition_block" placeholder="значение 2">
                            </div>
                        </div>
                    </div>
    
                    <div class="block-code" draggable="true" data-type="assign">
                        <div class="block-header">
                            <span class="block-title">Арифметика</span>
                        </div>
                        <div class="block-content">
                            <div class="condition-row">
    
                                <input type="text" class="input-left" id="input1_arif_block" placeholder="значение 1">
    
                                <select class="operator-select" id="zaebalo_arifm_block">
                                    <option value="=">=</option>
                                    <option value="+">+</option>
                                    <option value="-">-</option>
                                    <option value="*">*</option>
                                    <option value="/">/</option>
                                    <option value="%">%</option>
                                    <option value="=">=</option>
                                </select>
                                <input type="text" class="input-right" id="input2_arifm_block" placeholder="значение 2">
                            </div>
                        </div>
                    </div>
                </div>
            <div id = "buttons">
                <button id="100">Объявление</button>
                <button id="101">Присваивание</button>
                <button id="102">Арифметика</button>
                <button id="103">Условие</button>
                <button id="vs">Variables</button>
            </div>
        </div>

        <div class="right-panel" id="rightPanel">
            <div class="programming-space" id="proramingSpace">
              
            </div>            
        </div>

        <div class="coordinates" id="coordinates">
            X: 0 | Y: 0 | Zoom: 100%
        </div>
    </div>

    <script src="../js/script1.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../scripts/drop_script.js"></script>
    <script src="../scripts/zoom.js"></script>
    <script>
        let button = document.getElementById("100")
        button.addEventListener('click', EmptyVars)
        let button1 = document.getElementById("101")
        button1.addEventListener('click', AddValue)
        let button2 = document.getElementById("102")
        button2.addEventListener('click', Arifmetic)
        let button3 = document.getElementById("103")
        button3.addEventListener('click', If)
        let buttonVS = document.getElementById("vs")
        buttonVS.addEventListener('click', Varrs)
    </script>
</body>
</html>
