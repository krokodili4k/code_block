<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlockCode</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header class="header">
        <a class="logo">BlockCode</a> 
    </header>

    <div class="content">

        <div class="left-panel">
            <div class="left-panel">
                <div class="panel-header">
                    <h3>BLOCKS</h3>
                    <button class="clear-block-btn">Очистить код</button>
                </div>
    
                <div class="block-container">
    
                    <div class="block-code">
                        <div class="block-header">
                            <span class="block-title">Начало программы</span>
                        </div>
                    </div>

                    <div class="block-code">
                        <div class="block-header">
                            <span class="block-title">Конец программы</span>
                        </div>
                    </div>

                    <div class="block-code">
                        <div class="block-header">
                            <span class="block-title">Объявление переменных</span>
                        </div>
                        <div class="block-code-content">
                            <div class="block-varible">
                                <textarea name="block-of-varibles" id="block_of_variables" placeholder="переменные"></textarea>
                            </div>
                        </div>
                    </div>
    
                    <div class="block-code">
                        <div class="block-header">
                            <span class="block-title">Блок присваивания целочисленной переменной</span>
                        </div>
                        <div class="block-code-content">
                            <div class="block-varible">
                                <textarea name="block-name-varible" id="textarea_block_varible" placeholder="имя переменной"></textarea>
                                <span>=</span>
                                <textarea name="block-varible-values" id="textarea_block_values" placeholder="значение переменной"></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="block-code">
                        <div class="block-header">
                            <span class="block-title">Цикл (while)</span>
                        </div>
    
                        <div class="block-code-content">
                        </div>
                    </div>
                    
                    <div class="block-code">
                        <div class="block-header">
                            <span class="block-title">Если</span>
                        </div>
                        <div class="block-content">
                            <div class="condition-row">
                                <input type="text" class="input-left" placeholder="значение 1">
                                <select class="operator-select" id="operator-select2">
                                    <option value=">">></option>
                                    <option value="<"><</option>
                                    <option value="==">==</option>
                                    <option value="!=">!=</option>
                                    <option value=">=">>=</option>
                                    <option value="<="><=</option>
                                </select>
                                <input type="text" class="input-right" placeholder="значение 2">
                            </div>
                        </div>
                    </div>
    
                    <div class="block-code">
                        <div class="block-header">
                            <span class="block-title">Арифметика</span>
                        </div>
                        <div class="block-content">
                            <div class="condition-row">
    
                                <input type="text" class="input-left" placeholder="значение 1">
    
                                <select class="operator-select" id="operator-select3">
                                    <option value="+">+</option>
                                    <option value="-">-</option>
                                    <option value="*">*</option>
                                    <option value="/">/</option>
                                    <option value="%">%</option>
                                </select>
                                <input type="text" class="input-right" placeholder="значение 2">
                            </div>
                        </div>
                    </div>

                </div>
                <button id="111">Объявление переменных</button>
                <button id="112">Блок присваивания целочисленной переменной</button>
            </div>
        </div>
    </div>

    <script src="../js/script1.js"></script>
    <script src="../js/storage.js"></script>
    <script>
        let button = document.getElementById("111")
        button.addEventListener('click', EmptyVars)
        let button1 = document.getElementById("112")
        button1.addEventListener('click', AddValue)
</script>
</body>
</html>
