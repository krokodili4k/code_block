<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studing</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header class="header">
        <a class="logo">YouTube</a> 
    </header>

    <div class="content">

        <div class="left-panel">
            <div class="left-panel">
                <div class="panel-header">
                    <h3>BLOCKS</h3>
                    <button class="clear-block-btn">Очистить код</button>
                </div>
    
                <div class="block-container">
    
                    <div class="block-code">
                        <div class="block-header">
                            <span class="block-title">Начало программы</span>
                        </div>
                       
                    </div>
    
                <div class="block-container">
    
                    <div class="block-code">
                        <div class="block-header">
                            <span class="block-title">Блок присваивания</span>
                        </div>
                        <div class="block-code-content">
                            <select class="operator-select" id="operator-select1">
                                <option value="integer">int</option>
                                <option value="string">string</option>
                                <option value="boolean">bool</option>
                            </select>
                            <div class="block-varible">
                                <textarea name="block-name-varible" id="block-name-varible" placeholder="имя переменной"></textarea>
                                <span>=</span>
                                <textarea name="block-varible-values" id="block-varible-values" placeholder="значение переменной"></textarea>
                            </div>
                        </div>
                    </div>
    
                    <div class="block-code">
                        <div class="block-header">
                            <span class="block-title">Цикл</span>
                        </div>
    
                        <div class="block-code-content">
                        </div>
                    </div>
                    
                    <div class="block-code">
                        <div class="block-header">
                            <span class="block-title">Если</span>
                        </div>
                        <div class="block-content">
                            <div class="condition-row">
                                <input type="text" class="input-left" placeholder="значение 1">
                                <select class="operator-select" id="operator-select2">
                                    <option value=">">></option>
                                    <option value="<"><</option>
                                    <option value="==">==</option>
                                    <option value="!=">!=</option>
                                    <option value=">=">>=</option>
                                    <option value="<="><=</option>
                                </select>
                                <input type="text" class="input-right" placeholder="значение 2">
                            </div>
                        </div>
                    </div>
    
                    <div class="block-code">
                        <div class="block-header">
                            <span class="block-title">Действия</span>
                        </div>
                        <div class="block-content">
                            <div class="condition-row">
    
                                <input type="text" class="input-left" placeholder="значение 1">
    
                                <select class="operator-select" id="operator-select3">
                                    <option value="+">+</option>
                                    <option value="-">-</option>
                                    <option value="=">=</option>
                                    <option value="*">*</option>
                                    <option value="/">/</option>
                                </select>
                                <input type="text" class="input-right" placeholder="значение 2">
                            </div>
                        </div>
                    </div>

                    
                </div>
            </div>
        </div>
    </div>


</body>
</html>
