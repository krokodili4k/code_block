
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlockCode</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header class="header">
        <a class="logo">BlockCode</a> 
    </header>

    <div class="content">

        <div class="left-panel">
        
                <div class="panel-header">
                    <h3>BLOCKS</h3>
                    <button class="btn" id="clear-block-btn">Очистить код</button>
                    <button class="btn" id="run-program-btn">Запустить код</button>
                </div>
    
                <div class="block-container">
                    <div class="block-code" draggable="true" data-type="start">
                        <div class="block-header">
                            <span class="block-title">Начало программы</span>
                        </div>
                    </div>

                    <div class="block-code" draggable="true" data-type="VARIABLE">
                        <div class="block-header">
                            <span class="block-title">Объявление переменных</span>
                        </div>
                        <div class="block-code-content">
                            <div class="block-varible">
                                <input type="text" class="input-left" id="input_block_varible" placeholder="Введите перменные">
                            </div>
                        </div>
                    </div>
    
                    <div class="block-code" draggable="true" data-type="ASSIGN">
                        <div class="block-header">
                            <span class="block-title">Блок присваивания целочисленной переменной</span>
                        </div>
                        <div class="block-code-content">
                            <div class="block-varible">
                                <textarea name="block-name-varible" id="textarea_block_varible" placeholder="имя переменной"></textarea>
                                <span>=</span>
                                <textarea name="block-varible-values" id="textarea_block_values" placeholder="значение переменной"></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="block-code" draggable="true" data-type="WHILE">
                        <div class="block-header">
                            <span class="block-title">Цикл (while)</span>
                        </div>
                        <div class="block-code-content">
                            <div class="condition-row">
                                <input type="text" class="input-left" id="input1_while_block" placeholder="значение 1">
                                <select class="operator-select" id="selector_while_block">
                                    <option value=">">></option>
                                    <option value="<"><</option>
                                    <option value="==">==</option>
                                    <option value="!=">!=</option>
                                    <option value=">=">>=</option>
                                    <option value="<="><=</option>
                                </select>
                                <input type="text" class="input-right" id="input2_while_block" placeholder="значение 2">
                            </div>
                        </div>
                        <div class="spawn-zone">

                        </div>
                           
                        <div class="block-footer">
                            <span class="block-title">Конец цикла</span>
                        </div>
                    </div>
                    
                    <div class="block-code" draggable="true" data-type="IF">
                        <div class="block-header">
                            <span class="block-title">Если</span>
                        </div>
                        <div class="block-code-content">
                            <div class="condition-row">
                                <input type="text" class="input-left" id="input1_if_block" placeholder="значение 1">
                                <select class="operator-select" id="selector_if_block">
                                    <option value=">">></option>
                                    <option value="<"><</option>
                                    <option value="==">==</option>
                                    <option value="!=">!=</option>
                                    <option value=">=">>=</option>
                                    <option value="<="><=</option>
                                </select>
                                <input type="text" class="input-right" id="input2_if_block" placeholder="значение 2">
                            </div>
                            
                        </div>
                        <div class="spawn-zone">

                        </div>
                        <div class="block-footer">
                            <span class="block-title">Конец если</span>
                        </div>
                    </div>

                    <div class="block-code" draggable="true" data-type="IF-ELSE">
                        <div class="block-header">
                            <span class="block-title">Если</span>
                        </div>
                        <div class="block-code-content">
                            <div class="condition-row">
                                <input type="text" class="input-left" id="input1_if_else_block" placeholder="значение 1">
                                <select class="operator-select" id="selector1_if_else_block">
                                    <option value=">">></option>
                                    <option value="<"><</option>
                                    <option value="==">==</option>
                                    <option value="!=">!=</option>
                                    <option value=">=">>=</option>
                                    <option value="<="><=</option>
                                </select>
                                <input type="text" class="input-right" id="input2_if_else_block" placeholder="значение 2">
                            </div>
                        </div>
                        <div class="spawn-zone">

                        </div>
                        <div class="block-footer">
                            <span class="block-title">Конец если</span>
                        </div>
                        <div class="block-header">
                            <span class="block-title">иначе</span>
                        </div>
                        
                        <div class="spawn-zone">

                        </div>
                        
                        <div class="block-footer">
                            <span class="block-title">Конец иначе</span>
                        </div>
                    </div>
    
                </div>
            
        </div>

        <div class="right-panel" id="rightPanel">
            <div class="programming-space" id="proramingSpace">
              
                
            </div>            
        </div>

        <div class="coordinates" id="coordinates">
            X: 0 | Y: 0 | Zoom: 100%
        </div>
    </div>

    <div id="console-wrapper">
        <div id="console-tab" onclick="toggleConsole()">
            <div id="console-chervon"></div>
            <button id="console-clear-but" onclick="event.stopPropagation(); clearConsole()">Очистить</button>
        </div>
        <div id="console-body"></div>
    </div>

    <script src="../scripts/site_program/drag_drop.js"></script>
    <script src="../scripts/site_program/zoom.js"></script>
    <script src="../scripts/site_program/console.js"></script>
    <script type="module" src="../scripts/kapot.js"></script>
</body>
</html>
